version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ai-saas-db
    restart: always
    environment:
      POSTGRES_USER: aiuser
      POSTGRES_PASSWORD: aipassword
      POSTGRES_DB: aisaas
    ports:
      - "5432:5432"
    volumes:
      - ./data/db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ai-saas-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  backend:
    build: ./backend
    container_name: ai-saas-backend
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://aiuser:aipassword@db:5432/aisaas
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-me
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=525600
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: ./backend
    container_name: ai-saas-worker
    command: celery -A worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://aiuser:aipassword@db:5432/aisaas
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: ai-saas-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
